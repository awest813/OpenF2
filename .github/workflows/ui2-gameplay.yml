name: UI2 Gameplay Smoke

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  ui2-gameplay-smoke:
    runs-on: ubuntu-latest
    env:
      UI2_ONLY_GAMEPLAY_PANELS: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run UI2 gameplay smoke suite
        run: npx vitest run src/ui2/panelParity.test.ts
